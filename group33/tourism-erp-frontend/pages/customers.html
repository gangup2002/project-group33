<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h3>Tourism ERP</h3>
</div>

<div class="main-content">

<h2>Customer Relationship Management</h2>

<div class="card p-3 mb-4">

<h4>Add Customer</h4>

<input type="hidden" id="customerId">

<input type="text"
       id="fullName"
       class="form-control mb-2"
       placeholder="Full Name">

<input type="email"
       id="email"
       class="form-control mb-2"
       placeholder="Email">

<input type="text"
       id="phone"
       class="form-control mb-2"
       placeholder="Phone">

<input type="text"
       id="preferences"
       class="form-control mb-2"
       placeholder="Preferences">

<textarea
       id="feedback"
       class="form-control mb-2"
       placeholder="Feedback"></textarea>

<button id="saveBtn"
        class="btn btn-success"
        onclick="saveCustomer()">

Save Customer

</button>

<button id="updateBtn"
        class="btn btn-warning"
        onclick="updateCustomer()"
        style="display:none;">

Update Customer

</button>

<button id="cancelBtn"
        class="btn btn-secondary"
        onclick="clearForm()"
        style="display:none;">

Cancel

</button>

</div>

<div class="card p-3">

<h4>Customer List</h4>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Preferences</th>
<th>Feedback</th>
<th>Action</th>

</tr>

</thead>

<tbody id="customerTable"></tbody>

</table>

</div>

</div>

</div>

<script src="../js/customers.js"></script>

</body>
</html>
