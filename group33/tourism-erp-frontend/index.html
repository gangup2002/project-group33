<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tourism Agency ERP Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">
            <h3>Tourism ERP</h3>
        </div>

        <ul>

            <li><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>

            <li><a href="pages/users.html"><i class="fas fa-users"></i> Users</a></li>

            <li><a href="pages/tours.html"><i class="fas fa-map"></i> Tours</a></li>

            <li><a href="pages/bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a></li>

            <li><a href="pages/customers.html"><i class="fas fa-user-friends"></i> Customers</a></li>

            <li><a href="pages/staff.html"><i class="fas fa-user-tie"></i> Staff</a></li>

            <li><a href="pages/notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="header">

            <h2>Tourism Agency ERP Dashboard</h2>

        </div>

        <div class="row mt-4">

            <div class="col-md-4">
                <div class="card dashboard-card bg-primary text-white">
                    <h4>Total Users</h4>
                    <h1 id="userCount">0</h1>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card dashboard-card bg-success text-white">
                    <h4>Total Tours</h4>
                    <h1 id="tourCount">0</h1>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card dashboard-card bg-warning text-dark">
                    <h4>Total Bookings</h4>
                    <h1 id="bookingCount">0</h1>
                </div>
            </div>

        </div>

        <div class="row mt-4">

            <div class="col-md-4">
                <div class="card dashboard-card bg-info text-white">
                    <h4>Total Customers</h4>
                    <h1 id="customerCount">0</h1>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card dashboard-card bg-secondary text-white">
                    <h4>Total Staff</h4>
                    <h1 id="staffCount">0</h1>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card dashboard-card bg-danger text-white">
                    <h4>Notifications</h4>
                    <h1 id="notificationCount">0</h1>
                </div>
            </div>

        </div>

    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
