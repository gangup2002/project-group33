<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
<h3>Tourism ERP</h3>
</div>

<ul>

<li><a href="../index.html"><i class="fas fa-home"></i> Dashboard</a></li>

<li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>

<li><a href="tours.html"><i class="fas fa-map"></i> Tours</a></li>

<li class="active"><a href="#"><i class="fas fa-calendar-check"></i> Bookings</a></li>

<li><a href="customers.html"><i class="fas fa-user-friends"></i> Customers</a></li>

<li><a href="staff.html"><i class="fas fa-user-tie"></i> Staff</a></li>

<li><a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>

</ul>

</div>

<div class="main-content">

<h2>Booking Management</h2>

<div class="card p-3 mb-4">

<h4>Add New Booking</h4>

<input type="hidden" id="bookingId">

<input type="text"
       id="customerName"
       class="form-control mb-2"
       placeholder="Customer Name">

<input type="number"
       id="tourId"
       class="form-control mb-2"
       placeholder="Tour ID">

<input type="date"
       id="bookingDate"
       class="form-control mb-2">

<input type="number"
       id="peopleCount"
       class="form-control mb-2"
       placeholder="Number of People">

<input type="text"
       id="status"
       class="form-control mb-2"
       placeholder="Status">

<button id="saveBtn"
        class="btn btn-success"
        onclick="saveBooking()">

Save Booking

</button>

<button id="updateBtn"
        class="btn btn-warning"
        onclick="updateBooking()"
        style="display:none;">

Update Booking

</button>

<button id="cancelBtn"
        class="btn btn-secondary"
        onclick="clearForm()"
        style="display:none;">

Cancel

</button>

</div>

<div class="card p-3">

<h4>Booking List</h4>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Customer</th>
<th>Tour ID</th>
<th>Date</th>
<th>People</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="bookingTable"></tbody>

</table>

</div>

</div>

</div>

<script src="../js/bookings.js"></script>

</body>
</html>
