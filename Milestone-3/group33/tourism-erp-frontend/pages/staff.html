<!DOCTYPE html>
<html lang="en">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">
<h3>Tourism ERP</h3>
</div>

<ul>

<li><a href="../index.html"><i class="fas fa-home"></i> Dashboard</a></li>

<li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>

<li><a href="tours.html"><i class="fas fa-map"></i> Tours</a></li>

<li><a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>

</ul>

</div>

<div class="main-content">

<h2>Staff Management</h2>

<div class="card p-3 mb-4">

<h4>Add Staff Member</h4>

<input type="hidden" id="staffId">

<input type="text" id="fullName" class="form-control mb-2" placeholder="Full Name">

<input type="text" id="position" class="form-control mb-2" placeholder="Position">

<input type="text" id="department" class="form-control mb-2" placeholder="Department">

<input type="text" id="taskAssigned" class="form-control mb-2" placeholder="Task Assigned">

<input type="text" id="schedule" class="form-control mb-2" placeholder="Schedule">

<button id="saveBtn" class="btn btn-success" onclick="saveStaff()">
Save Staff
</button>

<button id="updateBtn"
        class="btn btn-warning"
        onclick="updateStaff()"
        style="display:none;">
Update Staff
</button>

<button id="cancelBtn"
        class="btn btn-secondary"
        onclick="clearForm()"
        style="display:none;">
Cancel
</button>

</div>

<div class="card p-3">

<h4>Staff List</h4>

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Position</th>
<th>Department</th>
<th>Task</th>
<th>Schedule</th>
<th>Action</th>

</tr>

</thead>

<tbody id="staffTable"></tbody>

</table>

</div>

</div>

</div>

<script src="../js/staff.js"></script>

</body>
</html>
